name: AI Model Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Run AI Validation Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ---------------------------------------------------------------
      # Run without API key → deterministic mock mode (always passes)
      # ---------------------------------------------------------------
      - name: Run tests (mock mode)
        run: |
          pytest tests/ -v --tb=short \
            --ignore=tests/test_performance.py \
            -m "not slow"
        env:
          ANTHROPIC_API_KEY: ""   # intentionally empty → mock fallback

      # ---------------------------------------------------------------
      # Full suite including benchmarks
      # ---------------------------------------------------------------
      - name: Run performance benchmarks
        run: |
          pytest tests/test_performance.py -v \
            --benchmark-only \
            --benchmark-json=benchmark-results.json
        env:
          ANTHROPIC_API_KEY: ""

      # ---------------------------------------------------------------
      # Optional: real API run (only when secret is configured)
      # ---------------------------------------------------------------
      - name: Run tests (real Claude API)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ---------------------------------------------------------------
      # Upload artefacts
      # ---------------------------------------------------------------
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-py${{ matrix.python-version }}
          path: benchmark-results.json
          retention-days: 30
